name: Build and Push to Artifact Registry

on:
  push:
    branches: [develop, main]

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: shariski-playground
  REGION: asia-southeast2
  REPOSITORY: auth
  IMAGE_NAME: api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/39583321202/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider'
          service_account: 'github@shariski-playground.iam.gserviceaccount.com'

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t $IMAGE .
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Push Docker image
        run: docker push $IMAGE

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: zentara-auth-test
          location: asia-southeast2

      - name: Update image tag in manifest
        run: |
          sed -i "s|image:.*|image: $IMAGE|" k8s/deployment.yaml

      - name: Apply manifest
        run: kubectl apply -f k8s/
