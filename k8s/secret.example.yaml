# Example Secret manifest. DO NOT commit a populated copy.
#
# Create the real Secret with kubectl, e.g.:
#   kubectl -n staging create secret generic auth-secrets \
#     --from-literal=DB_USER='postgres' \
#     --from-literal=DB_PASSWORD="$(openssl rand -base64 24)" \
#     --from-literal=REDIS_PASSWORD="$(openssl rand -base64 24)" \
#     --from-literal=JWT_SECRET="$(openssl rand -base64 48)"
#
# Repeat for the `production` namespace.
apiVersion: v1
kind: Secret
metadata:
  name: auth-secrets
  namespace: staging
type: Opaque
stringData:
  DB_USER: "postgres"
  DB_PASSWORD: "REPLACE_ME"
  REDIS_PASSWORD: "REPLACE_ME"
  JWT_SECRET: "REPLACE_ME_AT_LEAST_32_BYTES"
