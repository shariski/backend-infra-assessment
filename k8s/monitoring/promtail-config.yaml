apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: ${LOKI_URL}
        basic_auth:
          username: ${LOKI_USERNAME}
          password: ${LOKI_PASSWORD}
        # Identifies the cluster in Loki labels
        external_labels:
          cluster: auth-cluster

    # NOTE: We use static_configs with a path glob instead of kubernetes_sd_configs.
    # The k8s service discovery silently returned 0 targets on GKE 1.35 + Promtail 3.2
    # (RBAC verified working, but SD never produced targets — likely a version compat
    # issue). Static scrape with path-based namespace extraction works reliably.
    scrape_configs:
      - job_name: pod-logs
        static_configs:
          - targets: [localhost]
            labels:
              job: pod-logs
              __path__: /var/log/pods/staging_*/*/*.log
          - targets: [localhost]
            labels:
              job: pod-logs
              __path__: /var/log/pods/production_*/*/*.log
        pipeline_stages:
          # Strip the container runtime wrapper (timestamp, stream, log content)
          - cri: {}
          # Extract namespace, pod, container labels from the file path
          - regex:
              source: filename
              expression: '/var/log/pods/(?P<namespace>[^_]+)_(?P<pod>[^_]+)_[^/]+/(?P<container>[^/]+)/'
          - labels:
              namespace:
              pod:
              container:
          # For the auth Go app: parse slog JSON and promote `level` to a label
          # so queries like {container="auth", level="ERROR"} work efficiently.
          - match:
              selector: '{container="auth"}'
              stages:
                - json:
                    expressions:
                      level: level
                - labels:
                    level:
