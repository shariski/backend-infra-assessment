# Get these values from Grafana Cloud:
#   1. Sign up at https://grafana.com/auth/sign-up/create-user (free, no credit card)
#   2. After onboarding, go to your stack -> "Loki" -> "Send Logs"
#   3. Copy the URL, User (a numeric instance ID), and create an API token
#
# Then create the real Secret:
#   kubectl -n monitoring create secret generic grafana-cloud \
#     --from-literal=LOKI_URL='https://logs-prod-XXX.grafana.net/loki/api/v1/push' \
#     --from-literal=LOKI_USERNAME='123456' \
#     --from-literal=LOKI_PASSWORD='glc_eyJv...your-api-token...'
apiVersion: v1
kind: Secret
metadata:
  name: grafana-cloud
  namespace: monitoring
type: Opaque
stringData:
  LOKI_URL: "https://logs-prod-XXX.grafana.net/loki/api/v1/push"
  LOKI_USERNAME: "REPLACE_ME_NUMERIC_INSTANCE_ID"
  LOKI_PASSWORD: "REPLACE_ME_GRAFANA_CLOUD_API_TOKEN"
