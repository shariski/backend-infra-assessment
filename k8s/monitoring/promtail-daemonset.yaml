apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: monitoring
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      # Tolerate any taints so logs ship from every node, including spot/preemptible
      tolerations:
        - effect: NoSchedule
          operator: Exists
        - effect: NoExecute
          operator: Exists
      containers:
        - name: promtail
          image: grafana/promtail:3.2.1
          args:
            - -config.file=/etc/promtail/promtail.yaml
            - -config.expand-env=true
          env:
            - name: LOKI_URL
              valueFrom:
                secretKeyRef:
                  name: grafana-cloud
                  key: LOKI_URL
            - name: LOKI_USERNAME
              valueFrom:
                secretKeyRef:
                  name: grafana-cloud
                  key: LOKI_USERNAME
            - name: LOKI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-cloud
                  key: LOKI_PASSWORD
          ports:
            - name: http-metrics
              containerPort: 9080
          resources:
            requests:
              cpu: 15m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: run
              mountPath: /run/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: run
          emptyDir: {}
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
