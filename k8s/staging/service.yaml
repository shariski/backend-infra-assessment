apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: staging
  labels:
    app: auth
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "auth-bc"}'
spec:
  type: NodePort
  selector:
    app: auth
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
